<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NLC Vehicle Trip Analytics — Fleet Audit Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css">
<style>
/* ============================================================
   NLC FLEET TELEMETRY — DESIGN TOKENS
   Concept: a "black box flight recorder" reading for ground
   vehicles. Dark cockpit surface, brand green + gold accents,
   monospace for every number so it reads like instrumentation.
   ============================================================ */
:root{
  --bg:#0a0f0c;
  --bg-grid: #0d1310;
  --surface:#121810;
  --surface-2:#182018;
  --surface-3:#1e2920;
  --line: #26342a;
  --line-soft: #1c2620;
  --green:#1A5C2E;
  --green-bright:#3DA15E;
  --green-glow: rgba(61,161,94,0.35);
  --gold:#C9962A;
  --gold-bright:#E3B655;
  --text:#EAEFE9;
  --text-dim:#9DAEA0;
  --text-faint:#5E6E62;
  --amber:#D9923F;
  --amber-bright:#F0AE5C;
  --red-soft:#C7595A;
  --radius:10px;
  --radius-lg:16px;
  --font-display:'Space Grotesk', sans-serif;
  --font-body:'Inter', sans-serif;
  --font-mono:'JetBrains Mono', monospace;
  --shadow-panel: 0 1px 0 rgba(255,255,255,0.03) inset, 0 8px 24px -12px rgba(0,0,0,0.6);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(circle at 15% -10%, rgba(61,161,94,0.10), transparent 40%),
    radial-gradient(circle at 100% 0%, rgba(201,150,42,0.07), transparent 45%),
    var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
::selection{ background: var(--green-glow); }
a{color:var(--gold-bright);}
.mono{font-family:var(--font-mono);}
.hidden{display:none !important;}

/* scrollbar */
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px;}
::-webkit-scrollbar-thumb:hover{background:var(--green);}

/* ===================== TOPBAR ===================== */
.topbar{
  position:sticky; top:0; z-index:50;
  display:flex; align-items:center; gap:18px;
  padding:12px 22px;
  background:linear-gradient(180deg, rgba(10,15,12,0.97), rgba(10,15,12,0.92));
  border-bottom:1px solid var(--line);
  backdrop-filter:blur(8px);
  flex-wrap:wrap;
}
.brand{display:flex; align-items:center; gap:11px; margin-right:6px;}
.brand-badge{
  width:38px;height:38px;border-radius:9px;
  background:conic-gradient(from 220deg, var(--green), var(--green-bright), var(--gold));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:700;font-size:13px;color:#06140a;
  box-shadow:0 0 0 1px rgba(255,255,255,0.08) inset, 0 4px 14px -4px var(--green-glow);
  flex-shrink:0;
}
.brand-text{display:flex; flex-direction:column; line-height:1.15;}
.brand-text strong{font-family:var(--font-display);font-size:15px;letter-spacing:0.2px;}
.brand-text span{font-size:11px;color:var(--text-dim);}

.vehicle-tabs{
  display:flex; gap:6px; flex:1; overflow-x:auto;
  padding:3px; background:var(--surface); border:1px solid var(--line-soft);
  border-radius:11px;
  scrollbar-width:thin;
}
.vtab{
  display:flex; align-items:center; gap:8px;
  padding:7px 13px; border-radius:8px; cursor:pointer;
  white-space:nowrap; border:1px solid transparent;
  font-size:12.5px; color:var(--text-dim); transition:.15s;
  font-family:var(--font-mono);
}
.vtab:hover{background:var(--surface-2); color:var(--text);}
.vtab.active{
  background:var(--surface-3); color:var(--gold-bright); border-color:var(--line);
  box-shadow:0 0 0 1px rgba(201,150,42,0.18) inset;
}
.vtab .dot{width:6px;height:6px;border-radius:50%;background:var(--green-bright); flex-shrink:0;}
.vtab.flagged .dot{background:var(--amber-bright);}

.topbar-actions{display:flex; gap:8px; align-items:center;}
.btn{
  font-family:var(--font-body); font-weight:600; font-size:12.5px;
  padding:9px 14px; border-radius:9px; border:1px solid var(--line);
  background:var(--surface-2); color:var(--text); cursor:pointer;
  display:inline-flex; align-items:center; gap:7px; transition:.15s;
  white-space:nowrap;
}
.btn:hover{border-color:var(--green-bright); color:var(--green-bright); background:var(--surface-3);}
.btn-primary{background:linear-gradient(180deg, var(--green-bright), var(--green)); border-color:var(--green-bright); color:#06140a;}
.btn-primary:hover{filter:brightness(1.1); color:#06140a;}
.btn-gold{background:linear-gradient(180deg, var(--gold-bright), var(--gold)); border-color:var(--gold-bright); color:#1a1304;}
.btn-gold:hover{filter:brightness(1.08); color:#1a1304;}
.btn-ghost{background:transparent;}
.btn svg{width:14px;height:14px;flex-shrink:0;}

/* ===================== HERO TICKER ===================== */
.hero-ticker{
  display:grid; grid-template-columns:repeat(6,1fr); gap:1px;
  background:var(--line-soft); border-bottom:1px solid var(--line);
}
.tick{
  background:var(--bg-grid); padding:14px 18px;
  display:flex; flex-direction:column; gap:4px;
}
.tick .tlabel{font-size:10.5px; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-faint); font-weight:600;}
.tick .tval{font-family:var(--font-mono); font-size:21px; font-weight:600; color:var(--text); display:flex; align-items:baseline; gap:5px;}
.tick .tval .unit{font-size:11px; color:var(--text-dim); font-weight:500;}
.tick .tsub{font-size:10.5px; color:var(--text-faint);}
.tick.accent-gold .tval{color:var(--gold-bright);}
.tick.accent-green .tval{color:var(--green-bright);}
.tick.accent-amber .tval{color:var(--amber-bright);}

/* ===================== LAYOUT ===================== */
.layout{display:grid; grid-template-columns:440px 1fr; gap:16px; padding:16px 20px;}
@media (max-width:980px){ .layout{grid-template-columns:1fr;} }

.panel{
  background:var(--surface); border:1px solid var(--line-soft); border-radius:var(--radius-lg);
  box-shadow:var(--shadow-panel); overflow:hidden;
}
.panel-head{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  padding:13px 16px; border-bottom:1px solid var(--line-soft);
}
.panel-head h3{margin:0; font-family:var(--font-display); font-size:13.5px; font-weight:600; letter-spacing:0.2px; color:var(--text);}
.panel-head .ph-note{font-size:11px; color:var(--text-faint);}
.panel-body{padding:16px;}

.map-col{display:flex; flex-direction:column; gap:14px;}
#map{height:420px; width:100%; background:#0c1310;}
.map-legend{display:flex; gap:14px; padding:11px 16px; border-top:1px solid var(--line-soft); flex-wrap:wrap;}
.leg-item{display:flex; align-items:center; gap:6px; font-size:11px; color:var(--text-dim);}
.leg-swatch{width:11px;height:11px;border-radius:3px;}
.map-fallback{padding:14px 16px; font-size:12px; color:var(--amber-bright); background:rgba(217,146,63,0.08); border-top:1px solid var(--line-soft); display:none;}

.vehicle-card .row{display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px dashed var(--line-soft); gap:10px;}
.vehicle-card .row:last-child{border-bottom:none;}
.vehicle-card .k{color:var(--text-dim); font-size:12px;}
.vehicle-card .v{font-family:var(--font-mono); font-size:12.5px; text-align:right;}
.driver-select{
  font-family:var(--font-body); background:var(--surface-2); color:var(--text);
  border:1px solid var(--line); border-radius:7px; padding:6px 9px; font-size:12.5px; cursor:pointer;
}
.station-badge{
  display:inline-flex; align-items:center; gap:6px; font-size:11px; padding:4px 9px;
  border-radius:20px; background:var(--surface-3); border:1px solid var(--line); color:var(--text-dim);
}

.content-col{display:flex; flex-direction:column; gap:16px;}
.metric-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:12px;}
@media (max-width:1300px){ .metric-grid{grid-template-columns:repeat(2,1fr);} }
.mcard{
  background:var(--surface); border:1px solid var(--line-soft); border-radius:var(--radius);
  padding:14px 15px; display:flex; flex-direction:column; gap:6px; position:relative;
}
.mcard .mlabel{display:flex; align-items:center; gap:6px; font-size:11px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.06em; font-weight:600;}
.mcard .mval{font-family:var(--font-mono); font-size:24px; font-weight:600;}
.mcard .mfoot{font-size:11px; color:var(--text-dim);}
.mcard.warn{border-color:rgba(217,146,63,0.4);}
.mcard.warn .mval{color:var(--amber-bright);}
.info-dot{
  width:14px;height:14px;border-radius:50%;border:1px solid var(--text-faint); color:var(--text-faint);
  font-size:9.5px; display:inline-flex; align-items:center; justify-content:center; cursor:default; flex-shrink:0;
  position:relative;
}
.info-dot:hover .tip, .info-dot:focus .tip{opacity:1; transform:translateY(0); pointer-events:auto;}
.tip{
  position:absolute; bottom:130%; left:50%; transform:translateX(-50%) translateY(4px);
  background:#06140a; color:var(--text); border:1px solid var(--green-bright); padding:8px 10px;
  border-radius:7px; font-size:11.5px; line-height:1.4; width:210px; opacity:0; transition:.15s;
  pointer-events:none; z-index:30; font-family:var(--font-body); font-weight:400; text-transform:none;
  letter-spacing:0; box-shadow:0 8px 20px -6px rgba(0,0,0,0.6);
}

.chart-row{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
@media (max-width:760px){ .chart-row{grid-template-columns:1fr;} }
.chart-box{padding:14px 16px 8px;}
.chart-box canvas{max-height:230px;}

.review-list{display:flex; flex-direction:column; gap:0;}
.review-item{
  display:grid; grid-template-columns:90px 1fr auto; gap:12px; align-items:center;
  padding:11px 16px; border-bottom:1px solid var(--line-soft); font-size:12.5px;
}
.review-item:last-child{border-bottom:none;}
.review-tag{
  font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em;
  padding:4px 8px; border-radius:6px; text-align:center; white-space:nowrap;
}
.review-tag.speed{background:rgba(201,150,42,0.14); color:var(--gold-bright); border:1px solid rgba(201,150,42,0.35);}
.review-tag.halt{background:rgba(61,161,94,0.12); color:var(--green-bright); border:1px solid rgba(61,161,94,0.3);}
.review-tag.gap{background:rgba(217,146,63,0.14); color:var(--amber-bright); border:1px solid rgba(217,146,63,0.35);}
.review-tag.night{background:rgba(199,89,90,0.14); color:var(--red-soft); border:1px solid rgba(199,89,90,0.35);}
.review-desc{color:var(--text);}
.review-desc small{color:var(--text-faint); display:block; margin-top:2px;}
.review-meta{font-family:var(--font-mono); color:var(--text-dim); font-size:12px; text-align:right;}
.review-empty{padding:22px 16px; text-align:center; color:var(--text-faint); font-size:12.5px;}

/* ===================== TABLES ===================== */
.tables-wrap{padding:0 20px 16px; display:flex; flex-direction:column; gap:16px;}
.table-toolbar{display:flex; align-items:center; gap:10px; padding:12px 16px; border-bottom:1px solid var(--line-soft); flex-wrap:wrap;}
.search-box{
  flex:1; min-width:180px; background:var(--surface-2); border:1px solid var(--line); border-radius:8px;
  padding:7px 11px; color:var(--text); font-size:12.5px; font-family:var(--font-body);
}
.search-box:focus{outline:none; border-color:var(--green-bright);}
.table-scroll{overflow:auto; max-height:420px;}
table.data-tbl{width:100%; border-collapse:collapse; font-size:12.5px;}
table.data-tbl thead th{
  position:sticky; top:0; background:var(--surface-2); text-align:left; padding:9px 14px;
  font-size:10.5px; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-faint);
  border-bottom:1px solid var(--line); cursor:pointer; white-space:nowrap; user-select:none;
}
table.data-tbl thead th:hover{color:var(--gold-bright);}
table.data-tbl tbody td{padding:8px 14px; border-bottom:1px solid var(--line-soft); font-family:var(--font-mono); color:var(--text-dim); white-space:nowrap;}
table.data-tbl tbody tr:hover td{background:var(--surface-2); color:var(--text);}
.pill{padding:2px 8px; border-radius:20px; font-size:10.5px; font-family:var(--font-body); font-weight:600;}
.pill.long{background:rgba(61,161,94,0.14); color:var(--green-bright);}
.pill.fast{background:rgba(201,150,42,0.16); color:var(--gold-bright);}
.table-pager{display:flex; align-items:center; justify-content:flex-end; gap:10px; padding:10px 16px; font-size:12px; color:var(--text-dim);}
.pager-btn{background:var(--surface-2); border:1px solid var(--line); color:var(--text); border-radius:6px; padding:4px 9px; cursor:pointer; font-size:12px;}
.pager-btn:disabled{opacity:.35; cursor:not-allowed;}

/* ===================== FLEET COMPARISON ===================== */
.fleet-wrap{padding:0 20px 16px;}

/* ===================== FOOTER ===================== */
.app-footer{
  display:flex; align-items:center; justify-content:space-between; gap:14px;
  padding:16px 22px; border-top:1px solid var(--line-soft); color:var(--text-faint); font-size:11.5px; flex-wrap:wrap;
}
.app-footer .wm{font-family:var(--font-mono); color:var(--text-dim);}

/* ===================== TOAST ===================== */
#toast{
  position:fixed; bottom:20px; right:20px; z-index:200; display:flex; flex-direction:column; gap:8px;
}
.toast-msg{
  background:var(--surface-3); border:1px solid var(--green-bright); color:var(--text);
  padding:11px 16px; border-radius:9px; font-size:12.5px; box-shadow:0 10px 30px -8px rgba(0,0,0,0.6);
  animation:slideIn .2s ease;
}
.toast-msg.err{border-color:var(--red-soft);}
@keyframes slideIn{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}

/* ===================== EMPTY STATE ===================== */
.empty-state{padding:60px 20px; text-align:center; color:var(--text-faint);}
.empty-state h2{font-family:var(--font-display); color:var(--text-dim); font-size:18px;}

/* ===================== PRINT ===================== */
@media print{
  body{background:#fff !important; color:#111 !important;}
  .topbar, .table-toolbar, .table-pager, #toast, .driver-select, .btn, .map-fallback{display:none !important;}
  .panel{border:1px solid #ccc !important; box-shadow:none !important; background:#fff !important;}
  .mcard{border:1px solid #ccc !important; background:#fafafa !important;}
  .mcard .mval, .tick .tval{color:#111 !important;}
  .layout{grid-template-columns:1fr !important; padding:0 !important;}
  table.data-tbl tbody td, table.data-tbl thead th{color:#111 !important;}
  .hero-ticker{background:#eee !important;}
  .tick{background:#fff !important;}
  #map{height:300px !important;}
}
</style>
</head>

  <div id="mainContent"></div>

  <footer class="app-footer">

    <span class="wm">Muhammad Noman Khalid | MTO NLC Smart Solutions</span>
  </footer>
</div>

<div id="toast"></div>

/* ================= UTILITIES ================= */
function parseDurationToMinutes(str){
  if(!str) return 0;
  var s = String(str);
  var h = 0, m = 0;
  var hm = s.match(/(\d+)\s*hr/);
  var mm = s.match(/(\d+)\s*min/);
  if(hm) h = parseInt(hm[1],10);
  if(mm) m = parseInt(mm[1],10);
  return h*60+m;
}
function numFrom(str){
  if(str===null||str===undefined) return NaN;
  var v = parseFloat(String(str).replace(/[^0-9.\-]/g,""));
  return v;
}
function haversineKm(lat1,lon1,lat2,lon2){
  var R=6371;
  var dLat=(lat2-lat1)*Math.PI/180;
  var dLon=(lon2-lon1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function pad2(n){ return n<10? "0"+n : ""+n; }
function fmtNum(n, d){ if(n===undefined||n===null||isNaN(n)) return "—"; return n.toLocaleString("en-US",{maximumFractionDigits:(d===undefined?1:d), minimumFractionDigits:0}); }
function fmtKm(n){ return fmtNum(n,1)+" km"; }
function fmtKmh(n){ return fmtNum(n,1)+" km/h"; }
function fmtHrsFromMin(min){
  if(min===undefined||min===null||isNaN(min)) return "—";
  var h = Math.floor(min/60), m = Math.round(min%60);
  if(h<=0) return m+"m";
  return h+"h "+m+"m";
}
function fmtDateShort(d){
  if(!d || isNaN(d.getTime())) return "—";
  return d.toLocaleDateString("en-US",{month:"short",day:"2-digit",year:"numeric"});
}
function fmtDateTimeShort(d){
  if(!d || isNaN(d.getTime())) return "—";
  return d.toLocaleDateString("en-US",{month:"short",day:"2-digit"})+" "+d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
}
function escapeHtml(s){
  if(s===null||s===undefined) return "";
  return String(s).replace(/[&<>"']/g, function(c){ return ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c]; });
}
function isoWeekKey(d){
  var dt = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  var dayNum = (dt.getUTCDay()+6)%7;
  dt.setUTCDate(dt.getUTCDate()-dayNum+3);
  var firstThursday = new Date(Date.UTC(dt.getUTCFullYear(),0,4));
  var week = 1 + Math.round(((dt - firstThursday)/86400000 - 3 + ((firstThursday.getUTCDay()+6)%7))/7);
  return dt.getUTCFullYear()+"-W"+pad2(week);
}
function dayKey(d){
  return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());
}
function downloadBlob(filename, content, mime){
  var blob = new Blob([content], {type: mime||"text/plain"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
}

/* try/catch wrapped storage — falls back to in-memory if localStorage
   is blocked (e.g. inside a sandboxed preview iframe) */
var memStore = {};
var Store = {
  get:function(k){
    try{ var v = localStorage.getItem(k); return v===null? null : JSON.parse(v); }
    catch(e){ return memStore[k]===undefined? null : memStore[k]; }
  },
  set:function(k,v){
    try{ localStorage.setItem(k, JSON.stringify(v)); }
    catch(e){ memStore[k]=v; }
  }
};

/* ================= CORE ENGINE ================= */
/* takes raw = {summary:[[..]], idle:[[..]], route:[[..]]} and returns
   a fully computed vehicle analytics object. Used both for the two
   embedded starter vehicles AND for anything imported later — same
   function, same rules, every time. */
function buildVehicle(reg, raw, sourceLabel){
  var summary = {};
  (raw.summary||[]).forEach(function(row){
    if(!row) return;
    var k = row[0], v = row[1];
    if(k && v!==null && v!==undefined && v!=="") summary[k]=v;
  });

  var idleRows = raw.idle||[];
  var hIdx = -1;
  for(var i=0;i<idleRows.length;i++){ if(idleRows[i] && idleRows[i][0]==="Stop #"){ hIdx=i; break; } }
  var idle = [];
  for(var i2=hIdx+1;i2<idleRows.length;i2++){
    var r = idleRows[i2];
    if(!r || r[0]===null || r[0]===undefined || r[0]==="") continue;
    idle.push({
      idx:r[0], lat:parseFloat(r[1]), lon:parseFloat(r[2]),
      dateStr:r[3], arrivedStr:r[4], departedStr:r[5], durationStr:r[6],
      arrived:new Date(r[4]), departed:new Date(r[5]), durationMin:parseDurationToMinutes(r[6])
    });
  }

  var routeRows = raw.route||[];
  var rIdx = -1;
  for(var j=0;j<routeRows.length;j++){ if(routeRows[j] && routeRows[j][0]==="Point #"){ rIdx=j; break; } }
  var route = [];
  for(var j2=rIdx+1;j2<routeRows.length;j2++){
    var rr = routeRows[j2];
    if(!rr || rr[0]===null || rr[0]===undefined || rr[0]==="") continue;
    var lat=parseFloat(rr[1]), lon=parseFloat(rr[2]);
    if(!isNaN(lat) && !isNaN(lon)) route.push({idx:rr[0], lat:lat, lon:lon});
  }

  var totalDistanceKm = numFrom(summary["Total Distance (km)"]) || 0;
  var totalDurationMin = parseDurationToMinutes(summary["Total Duration"]);
  var tripStart = new Date(summary["Trip Start Time"]);
  var tripEnd = new Date(summary["Trip End Time"]);
  var totalGpsPoints = parseInt(numFrom(summary["Total GPS Points"])||0,10);
  var movingPoints = parseInt(numFrom(summary["Moving Points"])||0,10);
  var idleStopCount = parseInt(numFrom(summary["Idle / Stop Count"])||idle.length,10);

  var totalIdleMin = 0;
  idle.forEach(function(s){ totalIdleMin += s.durationMin; });
  var movingMin = Math.max(totalDurationMin-totalIdleMin, 0);
  var idleRatio = totalDurationMin>0 ? totalIdleMin/totalDurationMin : 0;
  var avgSpeedOverall = totalDurationMin>0 ? totalDistanceKm/(totalDurationMin/60) : 0;
  var avgSpeedMoving = movingMin>0 ? totalDistanceKm/(movingMin/60) : 0;

  /* movement legs = gaps between consecutive recorded stops */
  var legs = [];
  for(var k2=0;k2<idle.length-1;k2++){
    var a = idle[k2], b = idle[k2+1];
    var distKm = haversineKm(a.lat,a.lon,b.lat,b.lon);
    var timeHr = (b.arrived - a.departed)/3600000;
    var speed = timeHr>0 ? distKm/timeHr : 0;
    legs.push({
      n:k2+1, fromIdx:a.idx, toIdx:b.idx, distKm:distKm, timeHr:timeHr, speed:speed,
      start:a.departed, end:b.arrived, fromLoc:[a.lat,a.lon], toLoc:[b.lat,b.lon]
    });
  }

  var anomalies = legs.filter(function(l){ return l.speed > CFG.MAX_CREDIBLE_SPEED; });
  var credible = legs.filter(function(l){
    return l.distKm>=CFG.MIN_LEG_DIST_KM && l.timeHr>=CFG.MIN_LEG_TIME_HR && l.speed<=CFG.MAX_CREDIBLE_SPEED;
  });
  var topLegs = credible.slice().sort(function(x,y){ return y.speed-x.speed; }).slice(0,8);
  var estTopSpeed = topLegs.length? topLegs[0].speed : 0;
  var longHalts = idle.slice().sort(function(x,y){ return y.durationMin-x.durationMin; }).slice(0,8);
  var nightLegs = credible.filter(function(l){
    var h = l.start.getHours();
    return h>=CFG.NIGHT_START_HR && h<CFG.NIGHT_END_HR;
  });

  /* weekly distance trend (credible legs only — anomalies would distort it) */
  var weekMap = {};
  credible.forEach(function(l){
    var wk = isoWeekKey(l.start);
    weekMap[wk] = (weekMap[wk]||0) + l.distKm;
  });
  var weeks = Object.keys(weekMap).sort();
  var weeklyDistance = weeks.map(function(w){ return {week:w, km:weekMap[w]}; });

  /* halts by hour of day */
  var hourHist = new Array(24).fill(0);
  idle.forEach(function(s){ if(!isNaN(s.arrived.getTime())) hourHist[s.arrived.getHours()]++; });

  /* utilisation */
  var dayMap = {};
  credible.forEach(function(l){ dayMap[dayKey(l.start)] = true; });
  var activeDays = Object.keys(dayMap).length;
  var totalSpanDays = Math.max(1, Math.round((tripEnd-tripStart)/86400000));
  var utilization = activeDays/totalSpanDays;

  /* frequent locations (rounded to ~111m grid) */
  var locMap = {};
  idle.forEach(function(s){
    var key = s.lat.toFixed(3)+","+s.lon.toFixed(3);
    if(!locMap[key]) locMap[key] = {lat:s.lat, lon:s.lon, count:0, totalMin:0};
    locMap[key].count++; locMap[key].totalMin += s.durationMin;
  });
  var frequentLocations = Object.keys(locMap).map(function(k){ return locMap[k]; })
    .sort(function(x,y){ return y.count-x.count; }).slice(0,5);

  /* review points: merged, sorted by recency */
  var review = [];
  anomalies.forEach(function(l){
    review.push({tag:"gap", date:l.start, desc:"GPS signal jump between two recorded stops",
      sub:"Recorded distance/time imply a speed that isn't physically realistic — likely a tracker signal gap, not real driving.",
      meta: fmtKmh(l.speed)+" (excluded from stats)"});
  });
  topLegs.filter(function(l){ return l.speed>=CFG.SPEED_REVIEW_KMH; }).forEach(function(l){
    review.push({tag:"speed", date:l.start, desc:"Higher than usual average speed on a travel segment",
      sub:fmtKm(l.distKm)+" covered in "+l.timeHr.toFixed(1)+" hr (segment average, not an instant reading)",
      meta: fmtKmh(l.speed)});
  });
  nightLegs.forEach(function(l){
    review.push({tag:"night", date:l.start, desc:"Vehicle movement between midnight and 5 AM",
      sub:fmtKm(l.distKm)+" covered, average "+fmtKmh(l.speed),
      meta: l.start.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})});
  });
  longHalts.filter(function(s){ return s.durationMin >= CFG.LONG_HALT_REVIEW_HR*60; }).slice(0,5).forEach(function(s){
    review.push({tag:"halt", date:s.arrived, desc:"Extended halt at one location",
      sub:"Lat "+s.lat.toFixed(4)+", Lon "+s.lon.toFixed(4),
      meta: fmtHrsFromMin(s.durationMin)});
  });
  review.sort(function(x,y){ return y.date-x.date; });

  return {
    reg: reg, sourceLabel: sourceLabel||"", summary: summary, idle: idle, route: route, legs: legs,
    totalDistanceKm: totalDistanceKm, totalDurationMin: totalDurationMin, tripStart: tripStart, tripEnd: tripEnd,
    totalGpsPoints: totalGpsPoints, movingPoints: movingPoints, idleStopCount: idleStopCount,
    totalIdleMin: totalIdleMin, movingMin: movingMin, idleRatio: idleRatio,
    avgSpeedOverall: avgSpeedOverall, avgSpeedMoving: avgSpeedMoving,
    anomalies: anomalies, credible: credible, topLegs: topLegs, estTopSpeed: estTopSpeed,
    longHalts: longHalts, nightLegs: nightLegs, weeklyDistance: weeklyDistance, hourHist: hourHist,
    activeDays: activeDays, totalSpanDays: totalSpanDays, utilization: utilization,
    frequentLocations: frequentLocations, review: review,
    imei: summary["IMEI"]||"—"
  };
}

/* ================= LOAD VEHICLES ================= */
function addVehicleFromRaw(reg, raw, sourceLabel, opts){
  opts = opts||{};
  try{
    var v = buildVehicle(reg, raw, sourceLabel);
    App.vehicles[reg] = v;
    if(App.order.indexOf(reg)===-1) App.order.push(reg);
    if(!opts.silent){
      var stored = Store.get("nlc_trip_imported") || {};
      stored[reg] = raw;
      Store.set("nlc_trip_imported", stored);
    }
    return v;
  }catch(e){
    console.error(e);
    toast("Could not read data for "+reg+": "+e.message, true);
    return null;
  }
}

function loadInitial(){
  Object.keys(VEHICLE_RAW).forEach(function(reg){
    addVehicleFromRaw(reg, VEHICLE_RAW[reg], "starter file", {silent:true});
  });
  var stored = Store.get("nlc_trip_imported") || {};
  Object.keys(stored).forEach(function(reg){
    if(!App.vehicles[reg]) addVehicleFromRaw(reg, stored[reg], "imported", {silent:true});
  });
  App.active = App.order[0] || null;
}

/* ================= FILE IMPORT (XLSX / CSV) ================= */
function sheetNameMatch(name, kind){
  var n = name.toLowerCase();
  if(kind==="summary") return n.indexOf("trip summary")>=0 || n.indexOf("summary")>=0;
  if(kind==="idle") return n.indexOf("idle")>=0 || n.indexOf("stop")>=0;
  if(kind==="route") return n.indexOf("route")>=0;
  return false;
}

function parseWorkbookFile(file){
  return new Promise(function(resolve, reject){
    var reader = new FileReader();
    reader.onerror = function(){ reject(new Error("File could not be read")); };
    reader.onload = function(e){
      try{
        if(/\.csv$/i.test(file.name)){
          resolve(parseCsvTemplate(e.target.result));
          return;
        }
        var data = new Uint8Array(e.target.result);
        var wb = XLSX.read(data, {type:"array"});
        var raw = {summary:[], idle:[], route:[]};
        var registration = null;
        wb.SheetNames.forEach(function(sn){
          var rows = XLSX.utils.sheet_to_json(wb.Sheets[sn], {header:1, raw:false, defval:null});
          if(sheetNameMatch(sn,"summary")) raw.summary = rows;
          else if(sheetNameMatch(sn,"route")) raw.route = rows;
          else if(sheetNameMatch(sn,"idle")) raw.idle = rows;
        });
        raw.summary.forEach(function(r){ if(r && r[0]==="Registration No.") registration = r[1]; });
        if(!registration) registration = file.name.replace(/\.[^.]+$/,"");
        resolve({reg: String(registration).trim(), raw: raw});
      }catch(err){ reject(err); }
    };
    if(/\.csv$/i.test(file.name)) reader.readAsText(file);
    else reader.readAsArrayBuffer(file);
  });
}

/* best-effort parser for a flat CSV export that mirrors the same
   three-section template (summary / idle stops / route points) */
function parseCsvTemplate(text){
  var lines = text.split(/\r?\n/);
  var raw = {summary:[], idle:[], route:[]};
  var mode = null;
  var registration = null;
  for(var i=0;i<lines.length;i++){
    var line = lines[i];
    if(!line.trim()){ continue; }
    var low = line.toLowerCase();
    if(low.indexOf("vehicle trip report")>=0 || low.indexOf("vehicle information")>=0 || low.indexOf("trip overview")>=0){ mode="summary"; continue; }
    if(low.indexOf("idle & stop")>=0 || low.indexOf("idle and stop")>=0){ mode="idle"; continue; }
    if(low.indexOf("route coordinates")>=0){ mode="route"; continue; }
    var cols = line.split(",").map(function(c){ return c.replace(/^"|"$/g,"").trim(); });
    if(mode==="summary") raw.summary.push(cols);
    else if(mode==="idle") raw.idle.push(cols);
    else if(mode==="route") raw.route.push(cols);
  }
  raw.summary.forEach(function(r){ if(r && r[0]==="Registration No.") registration = r[1]; });
  if(!registration) throw new Error("Could not find 'Registration No.' — please check the CSV matches the trip report template.");
  // normalize numeric first columns for idle/route data rows
  function fixIdx(rows, headerLabel){
    var hi=-1;
    for(var k=0;k<rows.length;k++){ if(rows[k] && rows[k][0]===headerLabel){ hi=k; break; } }
    for(var k2=hi+1;k2<rows.length;k2++){ if(rows[k2] && rows[k2][0]!=="") rows[k2][0]=parseInt(rows[k2][0],10); }
  }
  fixIdx(raw.idle, "Stop #");
  fixIdx(raw.route, "Point #");
  return {reg: String(registration).trim(), raw: raw};
}

function handleFiles(fileList){
  var files = Array.prototype.slice.call(fileList);
  if(!files.length) return;
  var promises = files.map(function(f){ return parseWorkbookFile(f).catch(function(err){ return {error:err, file:f}; }); });
  Promise.all(promises).then(function(results){
    var added = [];
    results.forEach(function(res){
      if(res.error){ toast("Skipped "+res.file.name+": "+res.error.message, true); return; }
      var v = addVehicleFromRaw(res.reg, res.raw, "imported");
      if(v) added.push(res.reg);
    });
    if(added.length){
      toast("Added "+added.length+" vehicle file(s): "+added.join(", "));
      App.active = added[0];
      renderApp();
    }
  });
}

/* ================= RENDERING ================= */
function renderApp(){
  renderTabs();
  var v = App.vehicles[App.active];
  var main = document.getElementById("mainContent");
  if(!v){
    main.innerHTML = '<div class="empty-state"><h2>No vehicle data loaded</h2><p>Click "Add Vehicle File" above and choose a trip report (.xlsx) to get started.</p></div>';
    return;
  }
  main.innerHTML = mainTemplate(v);
  postRenderMain(v);
}

function renderTabs(){
  var box = document.getElementById("vehicleTabs");
  box.innerHTML = "";
  App.order.forEach(function(reg){
    var v = App.vehicles[reg];
    var di = driverInfo(reg);
    var flagged = v.anomalies.length>0 || v.review.filter(function(r){return r.tag==="speed"||r.tag==="night";}).length>0;
    var tab = document.createElement("div");
    tab.className = "vtab"+(reg===App.active?" active":"")+(flagged?" flagged":"");
    tab.innerHTML = '<span class="dot"></span>'+escapeHtml(reg)+(di.driver&&di.driver!=="Unassigned"?' · '+escapeHtml(di.driver.split(" ")[0]):"");
    tab.title = reg+" — "+di.driver+" ("+di.station+")";
    tab.addEventListener("click", function(){ App.active = reg; renderApp(); });
    box.appendChild(tab);
  });
}

        '<h3 style="margin:0;font-family:var(--font-display);font-size:13.5px">Travel Segments ('+v.legs.length+')</h3>'+
        '<input class="search-box" id="legsSearch" placeholder="Search by date…">'+
        '<button class="btn btn-ghost" id="exportLegsBtn">Export CSV</button>'+
      '</div>'+
      '<div class="table-scroll"><table class="data-tbl" id="legsTable"></table></div>'+
      '<div class="table-pager" id="legsPager"></div>'+
    '</div>'+

    '<div class="panel">'+
      '<div class="panel-head"><h3>Fleet Comparison</h3><span class="ph-note">all vehicles currently loaded in this dashboard</span></div>'+
      '<div class="table-scroll"><table class="data-tbl" id="fleetTable"></table></div>'+
    '</div>'+
  '</div>';
}

function metricCards(v){
  var gapsWarn = v.anomalies.length>0;
  var cards = [
    {label:"Total Distance", val:fmtKm(v.totalDistanceKm), foot:"Reported by GPS tracker over "+v.totalSpanDays+" days", tip:"Total distance figure as recorded by the GPS tracking system for the full reporting period."},
    {label:"Reporting Duration", val:fmtHrsFromMin(v.totalDurationMin), foot:fmtDateShort(v.tripStart)+" to "+fmtDateShort(v.tripEnd), tip:"Total time between the first and last GPS record in this report."},
    {label:"Avg Speed (Moving)", val:fmtKmh(v.avgSpeedMoving), foot:"Distance ÷ time actually moving", tip:"Idle/parked time is excluded, so this reflects real driving speed, not overall trip pace."},
    {label:"Est. Top Speed", val:fmtKmh(v.estTopSpeed), foot:v.topLegs.length+" travel segments checked", tip:"Highest average speed found on a single travel segment between two recorded stops. It's a GPS-based estimate, not a radar/instant speed reading."},
    {label:"Idle Time", val:fmtHrsFromMin(v.totalIdleMin)+" ("+fmtNum(v.idleRatio*100,0)+"%)", foot:v.idleStopCount+" recorded halts", tip:"Total time the vehicle was parked/stationary, and what share of the full reporting period that is."},
    {label:"Active Days", val:fmtNum(v.activeDays,0)+" / "+v.totalSpanDays, foot:fmtNum(v.utilization*100,0)+"% of days had movement", tip:"Number of days the vehicle actually moved at least once, out of the total days in this report."},
    {label:"Halts ≥ 24h", val:fmtNum(v.longHalts.filter(function(s){return s.durationMin>=1440;}).length,0), foot:"out of "+v.idleStopCount+" total halts", tip:"Count of stops where the vehicle stayed parked at one place for 24 hours or more."},
    {label:"GPS Data Quality", val: gapsWarn? v.anomalies.length+" signal gap"+(v.anomalies.length>1?"s":"") : "Clean", foot: gapsWarn? "excluded from speed stats" : v.totalGpsPoints.toLocaleString()+" GPS points received", tip:"A signal gap is when the tracker implies a physically impossible speed — usually a temporary loss of GPS signal, not real driving."}
  ];
  return cards.map(function(c,i){
    return '<div class="mcard'+(i===7&&gapsWarn?" warn":"")+'"><div class="mlabel">'+c.label+infoDot(c.tip)+'</div><div class="mval">'+c.val+'</div><div class="mfoot">'+c.foot+'</div></div>';
  }).join("");
}

var TAG_LABEL = {gap:"Signal Gap", speed:"High Speed", night:"Night Move", halt:"Long Halt"};
function reviewListHtml(v){
  if(!v.review.length) return '<div class="review-empty">No unusual patterns flagged for this vehicle in the current data.</div>';
  return v.review.slice(0,12).map(function(r){
    return '<div class="review-item">'+
      '<span class="review-tag '+r.tag+'">'+TAG_LABEL[r.tag]+'</span>'+
      '<span class="review-desc">'+escapeHtml(r.desc)+'<small>'+escapeHtml(r.sub)+'</small></span>'+
      '<span class="review-meta">'+escapeHtml(r.meta)+'<br><span style="color:var(--text-faint)">'+fmtDateShort(r.date)+'</span></span>'+
    '</div>';
  }).join("");
}

/* ================= POST-RENDER: map, charts, tables, listeners ================= */
function postRenderMain(v){
  buildMap(v);
  buildCharts(v);
  buildStopsTable(v);
  buildLegsTable(v);
  buildFleetTable();
  wireVehicleCardEvents(v);
  wireTableEvents(v);
}

function wireVehicleCardEvents(v){
  var ds = document.getElementById("driverSelect");
  var ss = document.getElementById("stationSelect");
  if(ds) ds.addEventListener("change", function(){ setOverride(v.reg,"driver",ds.value); renderTabs(); toast("Driver updated for "+v.reg); });
  if(ss) ss.addEventListener("change", function(){ setOverride(v.reg,"station",ss.value); toast("Station updated for "+v.reg); });
}

function destroyCharts(){
  Object.keys(App.charts).forEach(function(k){ if(App.charts[k]) App.charts[k].destroy(); });
  App.charts = {};
}

var CHART_FONT = {family:"'Inter', sans-serif", size:11};
var GRID_COLOR = "rgba(255,255,255,0.06)";
var TEXT_DIM = "#9DAEA0";

function buildCharts(v){
  destroyCharts();
  if(typeof Chart === "undefined") return;
  Chart.defaults.font.family = "'Inter', sans-serif";
  Chart.defaults.color = TEXT_DIM;

  // distance trend
  var dtCtx = document.getElementById("distanceTrendChart");
  if(dtCtx){
    App.charts.dt = new Chart(dtCtx, {
      type:"bar",
      data:{ labels: v.weeklyDistance.map(function(w){return w.week.replace(/^\d+-/,"");}),
        datasets:[{label:"km", data:v.weeklyDistance.map(function(w){return w.km;}),
          backgroundColor:"rgba(61,161,94,0.55)", borderColor:"#3DA15E", borderWidth:1, borderRadius:4, maxBarThickness:26}]},
      options:{ responsive:true, plugins:{legend:{display:false}},
        scales:{ x:{grid:{display:false}, ticks:{maxRotation:0, autoSkip:true}}, y:{grid:{color:GRID_COLOR}, title:{display:true,text:"km"}}}}
    });
  }
  // idle vs moving doughnut
  var imCtx = document.getElementById("idleMovingChart");
  if(imCtx){
    App.charts.im = new Chart(imCtx, {
      type:"doughnut",
      data:{ labels:["Idle / Parked","Moving"], datasets:[{data:[v.totalIdleMin, v.movingMin], backgroundColor:["#C9962A","#3DA15E"], borderWidth:0}]},
      options:{ responsive:true, plugins:{legend:{position:"bottom", labels:{boxWidth:10}}}, cutout:"62%"}
    });
  }
  // hour histogram
  var hhCtx = document.getElementById("hourHistChart");
  if(hhCtx){
    App.charts.hh = new Chart(hhCtx, {
      type:"bar",
      data:{ labels: v.hourHist.map(function(_,i){return i+"h";}),
        datasets:[{data:v.hourHist, backgroundColor:"rgba(201,150,42,0.55)", borderColor:"#C9962A", borderWidth:1, borderRadius:3}]},
      options:{ responsive:true, plugins:{legend:{display:false}},
        scales:{ x:{grid:{display:false}, ticks:{maxRotation:0, autoSkip:true, font:{size:9}}}, y:{grid:{color:GRID_COLOR}}}}
    });
  }
  // long halts
  var lhCtx = document.getElementById("longHaltsChart");
  if(lhCtx){
    var lh = v.longHalts.slice(0,6);
    App.charts.lh = new Chart(lhCtx, {
      type:"bar",
      data:{ labels: lh.map(function(s){return fmtDateShort(s.arrived);}),
        datasets:[{data: lh.map(function(s){return +(s.durationMin/60).toFixed(1);}), backgroundColor:"rgba(61,161,94,0.55)", borderColor:"#3DA15E", borderWidth:1, borderRadius:4}]},
      options:{ indexAxis:"y", responsive:true, plugins:{legend:{display:false}},
        scales:{ x:{grid:{color:GRID_COLOR}, title:{display:true,text:"hours"}}, y:{grid:{display:false}}}}
    });
  }
  // fastest legs
  var flCtx = document.getElementById("fastLegsChart");
  if(flCtx){
    var fl = v.topLegs.slice(0,6);
    App.charts.fl = new Chart(flCtx, {
      type:"bar",
      data:{ labels: fl.map(function(l){return fmtDateShort(l.start);}),
        datasets:[{data: fl.map(function(l){return +l.speed.toFixed(1);}), backgroundColor:"rgba(201,150,42,0.55)", borderColor:"#C9962A", borderWidth:1, borderRadius:4}]},
      options:{ indexAxis:"y", responsive:true, plugins:{legend:{display:false}},
        scales:{ x:{grid:{color:GRID_COLOR}, title:{display:true,text:"km/h"}}, y:{grid:{display:false}}}}
    });
  }
}

/* ---------- map ---------- */
function buildMap(v){
  var el = document.getElementById("map");
  if(!el || typeof L === "undefined") return;
  if(App.map){ App.map.remove(); App.map=null; }
  var fallback = document.getElementById("mapFallback");
  try{
    App.map = L.map("map", {scrollWheelZoom:false, attributionControl:true});
    var tiles = L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
      attribution:'&copy; OpenStreetMap &copy; CARTO', maxZoom:19, subdomains:"abcd"
    });
    var tileErrored = false;
    tiles.on("tileerror", function(){
      if(!tileErrored){ tileErrored = true; if(fallback) fallback.style.display = "block"; }
    });
    tiles.addTo(App.map);

    var pts = v.route.map(function(p){ return [p.lat, p.lon]; });
    if(pts.length){
      var poly = L.polyline(pts, {color:"#9DAEA0", weight:2.5, opacity:0.8}).addTo(App.map);
      App.map.fitBounds(poly.getBounds(), {padding:[24,24]});
    } else {
      App.map.setView([30.3753,69.3451], 5);
    }

    if(pts.length){
      L.circleMarker(pts[0], {radius:7, color:"#3DA15E", fillColor:"#3DA15E", fillOpacity:0.9, weight:2}).addTo(App.map).bindPopup("Start: "+fmtDateTimeShort(v.tripStart));
      L.circleMarker(pts[pts.length-1], {radius:7, color:"#E3B655", fillColor:"#E3B655", fillOpacity:0.9, weight:2}).addTo(App.map).bindPopup("End: "+fmtDateTimeShort(v.tripEnd));
    }
    var maxDur = Math.max.apply(null, v.idle.map(function(s){return s.durationMin;}).concat([1]));
    v.idle.forEach(function(s){
      var r = 3 + 9*Math.sqrt(s.durationMin/maxDur);
      L.circleMarker([s.lat,s.lon], {radius:r, color:"#C7595A", fillColor:"#C7595A", fillOpacity:0.35, weight:1}).addTo(App.map)
        .bindPopup("Stop #"+s.idx+"<br>"+fmtDateTimeShort(s.arrived)+" → "+fmtDateTimeShort(s.departed)+"<br>Duration: "+s.durationStr);
    });
  }catch(e){
    console.error(e);
    if(fallback) fallback.style.display = "block";
  }
}

/* ---------- tables ---------- */
function sortRows(rows, col, dir, getter){
  return rows.slice().sort(function(a,b){
    var av = getter(a,col), bv = getter(b,col);
    if(av<bv) return -1*dir; if(av>bv) return 1*dir; return 0;
  });
}

function buildStopsTable(v){
  var table = document.getElementById("stopsTable");
  var cols = [
    {k:"idx", label:"#"}, {k:"dateStr", label:"Date"}, {k:"arrivedStr", label:"Arrived"},
    {k:"departedStr", label:"Departed"}, {k:"durationMin", label:"Duration"}, {k:"lat", label:"Lat"}, {k:"lon", label:"Lon"}
  ];
  function getter(row,col){ return row[col]; }
  function render(){
    var q = (App.searchState.stops||"").toLowerCase();
    var rows = v.idle.filter(function(s){
      if(!q) return true;
      return (s.dateStr+" "+s.lat+" "+s.lon).toLowerCase().indexOf(q)>=0;
    });
    var st = App.sortState.stops;
    rows = sortRows(rows, st.col, st.dir, getter);
    var thead = "<thead><tr>"+cols.map(function(c){
      return '<th data-col="'+c.k+'">'+c.label+(st.col===c.k?(st.dir===1?" ▲":" ▼"):"")+'</th>';
    }).join("")+"</tr></thead>";
    var tbody = "<tbody>"+rows.map(function(s){
      var longPill = s.durationMin>=1440 ? '<span class="pill long">'+fmtHrsFromMin(s.durationMin)+'</span>' : fmtHrsFromMin(s.durationMin);
      return "<tr><td>"+s.idx+"</td><td>"+escapeHtml(s.dateStr)+"</td><td>"+escapeHtml(s.arrivedStr)+"</td><td>"+escapeHtml(s.departedStr)+"</td><td>"+longPill+"</td><td>"+s.lat.toFixed(5)+"</td><td>"+s.lon.toFixed(5)+"</td></tr>";
    }).join("")+"</tbody>";
    table.innerHTML = thead+tbody;
    document.getElementById("stopsPager").textContent = "Showing "+rows.length+" of "+v.idle.length+" halts";
    table.querySelectorAll("th").forEach(function(th){
      th.addEventListener("click", function(){
        var col = th.getAttribute("data-col");
        if(st.col===col) st.dir*=-1; else { st.col=col; st.dir=1; }
        render();
      });
    });
  }
  render();
  var search = document.getElementById("stopsSearch");
  search.addEventListener("input", function(){ App.searchState.stops = search.value; render(); });
  document.getElementById("exportStopsBtn").addEventListener("click", function(){
    var csv = "Stop #,Date,Arrived,Departed,Duration,Latitude,Longitude\n" + v.idle.map(function(s){
      return [s.idx,s.dateStr,s.arrivedStr,s.departedStr,s.durationStr,s.lat,s.lon].join(",");
    }).join("\n");
    downloadBlob(v.reg+"_halts.csv", csv, "text/csv");
  });
}

function buildLegsTable(v){
  var table = document.getElementById("legsTable");
  var cols = [
    {k:"n", label:"#"}, {k:"start", label:"Departed"}, {k:"end", label:"Arrived"},
    {k:"distKm", label:"Distance"}, {k:"timeHr", label:"Duration"}, {k:"speed", label:"Avg Speed"}
  ];
  function getter(row,col){
    if(col==="start"||col==="end") return row[col].getTime();
    return row[col];
  }
  function render(){
    var q = (App.searchState.legs||"").toLowerCase();
    var rows = v.legs.filter(function(l){
      if(!q) return true;
      return fmtDateShort(l.start).toLowerCase().indexOf(q)>=0;
    });
    var st = App.sortState.legs;
    rows = sortRows(rows, st.col, st.dir, getter);
    var thead = "<thead><tr>"+cols.map(function(c){
      return '<th data-col="'+c.k+'">'+c.label+(st.col===c.k?(st.dir===1?" ▲":" ▼"):"")+'</th>';
    }).join("")+"</tr></thead>";
    var tbody = "<tbody>"+rows.map(function(l){
      var isAnomaly = l.speed>CFG.MAX_CREDIBLE_SPEED;
      var speedCell = isAnomaly ? '<span class="pill" style="background:rgba(199,89,90,0.18);color:#C7595A">signal gap</span>' :
        (l.speed>=CFG.SPEED_REVIEW_KMH ? '<span class="pill fast">'+fmtKmh(l.speed)+'</span>' : fmtKmh(l.speed));
      return "<tr><td>"+l.n+"</td><td>"+fmtDateTimeShort(l.start)+"</td><td>"+fmtDateTimeShort(l.end)+"</td><td>"+fmtKm(l.distKm)+"</td><td>"+l.timeHr.toFixed(2)+" hr</td><td>"+speedCell+"</td></tr>";
    }).join("")+"</tbody>";
    table.innerHTML = thead+tbody;
    document.getElementById("legsPager").textContent = "Showing "+rows.length+" of "+v.legs.length+" segments";
    table.querySelectorAll("th").forEach(function(th){
      th.addEventListener("click", function(){
        var col = th.getAttribute("data-col");
        if(st.col===col) st.dir*=-1; else { st.col=col; st.dir=1; }
        render();
      });
    });
  }
  render();
  var search = document.getElementById("legsSearch");
  search.addEventListener("input", function(){ App.searchState.legs = search.value; render(); });
  document.getElementById("exportLegsBtn").addEventListener("click", function(){
    var csv = "Segment #,Departed,Arrived,Distance(km),Duration(hr),AvgSpeed(km/h)\n" + v.legs.map(function(l){
      return [l.n, l.start.toISOString(), l.end.toISOString(), l.distKm.toFixed(2), l.timeHr.toFixed(2), l.speed.toFixed(1)].join(",");
    }).join("\n");
    downloadBlob(v.reg+"_segments.csv", csv, "text/csv");
  });
}

function buildFleetTable(){
  var table = document.getElementById("fleetTable");
  if(!table) return;
  var thead = "<thead><tr><th>Vehicle</th><th>Driver</th><th>Station</th><th>Distance</th><th>Avg Speed</th><th>Idle %</th><th>Utilization</th><th>Halts</th><th>Data Quality</th></tr></thead>";
  var rows = App.order.map(function(reg){
    var v = App.vehicles[reg];
    var di = driverInfo(reg);
    var quality = v.anomalies.length>0 ? '<span class="pill" style="background:rgba(217,146,63,0.16);color:#F0AE5C">'+v.anomalies.length+' gap'+(v.anomalies.length>1?'s':'')+'</span>' : '<span class="pill long">clean</span>';
    var active = reg===App.active ? ' style="background:var(--surface-2)"' : '';
    return "<tr"+active+"><td>"+escapeHtml(reg)+"</td><td>"+escapeHtml(di.driver)+"</td><td>"+escapeHtml(di.station)+"</td><td>"+fmtKm(v.totalDistanceKm)+"</td><td>"+fmtKmh(v.avgSpeedMoving)+"</td><td>"+fmtNum(v.idleRatio*100,0)+"%</td><td>"+fmtNum(v.utilization*100,0)+"%</td><td>"+v.idleStopCount+"</td><td>"+quality+"</td></tr>";
  }).join("");
  table.innerHTML = thead+"<tbody>"+rows+"</tbody>";
}

function wireTableEvents(v){ /* search/sort handlers wired inside build*Table */ }

/* ================= INIT ================= */
function init(){
  loadInitial();
  renderApp();

  document.getElementById("btnImport").addEventListener("click", function(){
    document.getElementById("fileInput").click();
  });
  document.getElementById("fileInput").addEventListener("change", function(e){
    handleFiles(e.target.files);
    e.target.value = "";
  });
  document.getElementById("btnPrint").addEventListener("click", function(){
    toast("Tip: in the print dialog, enable 'Background graphics' to keep colors and the map.");
    setTimeout(function(){ window.print(); }, 400);
  });
}

if(document.readyState==="loading") document.addEventListener("DOMContentLoaded", init);
else init();

})();
